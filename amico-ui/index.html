<!DOCTYPE html>
<html>
<head>
  <title>OmniCore AI</title>
</head>
<body>

  <h2>OmniCore AI Chat</h2>

  <input id="input" placeholder="Type message..." style="width:300px;" />
  <button onclick="send()">Send</button>

  <p><strong>Response:</strong></p>
  <div id="output"></div>

  <script>
    async function send() {
      const message = document.getElementById("input").value;

      const res = await fetch("https://omnicore-pbi5.onrender.com/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });

      const data = await res.json();
      document.getElementById("output").innerText = data.response;
    }
  </script>

</body>
</html>
