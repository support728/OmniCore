<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account Settings | OmniCore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <div class="app-shell settings-shell">
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">OmniCore</p>
        <h1>Account Settings</h1>
        <p class="live-meta">Manage your profile and account security.</p>
      </div>
      <div class="top-controls">
        <a class="settings-link" href="/">Back to Dashboard</a>
      </div>
    </header>

    <main class="settings-grid">
      <section class="panel">
        <div class="panel-head compact">
          <h2>Profile</h2>
          <span id="settings-status" class="meta">Loading...</span>
        </div>
        <div class="list">
          <article class="item">
            <h3>Username</h3>
            <p id="profile-username">-</p>
          </article>
          <article class="item">
            <h3>User ID</h3>
            <p id="profile-user-id">-</p>
          </article>
          <article class="item">
            <h3>Created</h3>
            <p id="profile-created">-</p>
          </article>
          <article class="item">
            <h3>Last Login</h3>
            <p id="profile-last-login">-</p>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head compact">
          <h2>Update Profile</h2>
        </div>
        <form id="profile-form" class="goal-form">
          <label for="display-name">Display name</label>
          <input id="display-name" maxlength="128" placeholder="Enter display name" />
          <div class="goal-form-actions">
            <button type="submit">Save Profile</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head compact">
          <h2>Security</h2>
        </div>
        <form id="password-form" class="goal-form">
          <label for="current-password">Current password</label>
          <input id="current-password" type="password" maxlength="128" />
          <label for="new-password">New password</label>
          <input id="new-password" type="password" maxlength="128" />
          <div class="goal-form-actions">
            <button type="submit">Change Password</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head compact">
          <h2>Session</h2>
        </div>
        <div class="goal-form-actions">
          <button id="logout-button" type="button">Logout</button>
        </div>
      </section>
    </main>
  </div>

  <script src="/web/settings.js" defer></script>
</body>
</html>
