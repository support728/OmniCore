<!DOCTYPE html>
<html>
<head>
    <title>Amico AI</title>
</head>
<body>

<h1>Amico AI</h1>

<input id="input" type="text" placeholder="Type or speak..." />
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="replayVoice()">🔊 Replay</button>
<button onclick="stopVoice()">Stop</button>

<p id="response"></p>

<script>
speechSynthesis.onvoiceschanged = () => {};
let lastResponse = "";
async function send(textOverride=null) {
    const input = textOverride || document.getElementById("input").value;

    const res = await fetch("http://127.0.0.1:8000/api/chat/dashboard-update", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_input: input
        })
    });

    const data = await res.json();
    lastResponse = data.answer;
    const responseEl = document.getElementById("response");
    responseEl.innerHTML = "";

    if (data.results) {
        data.results.forEach(r => {
            const div = document.createElement("div");
            div.innerHTML = `
                <div style="margin-bottom:10px;">
                    <a href="${r.url}" target="_blank" style="font-weight:bold;">
                        ${r.title}
                    </a>
                    <div>${r.snippet}</div>
                </div>
            `;
            responseEl.appendChild(div);
        });
    } else {
        responseEl.innerText = data.answer;
    }
    speak(lastResponse);
}

function speak(text) {
    const voices = speechSynthesis.getVoices();

    const speech = new SpeechSynthesisUtterance(text);

    speech.voice =
        voices.find(v => v.name.includes("Google") && v.lang.includes("en")) ||
        voices.find(v => v.lang === "en-US") ||
        voices[0];

    speech.lang = "en-US";
    speech.rate = 1;
    speech.pitch = 1;

    speechSynthesis.cancel(); // IMPORTANT
    speechSynthesis.speak(speech);
}

function stopVoice() {
    speechSynthesis.cancel();
}

function replayVoice() {
  if (lastResponse) speak(lastResponse);
}

// Voice
function startVoice() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("response").innerText = "❌ Voice not supported";
        return;
    }

    const recognition = new SpeechRecognition();

    recognition.lang = "en-US";
    recognition.interimResults = false;

    document.getElementById("response").innerText = "🎤 Listening...";

    speechSynthesis.cancel();
    recognition.start();

    recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;

        document.getElementById("input").value = text;
        document.getElementById("response").innerText = "Processing...";

        send(text);
    };

    recognition.onerror = function(err) {
        document.getElementById("response").innerText = "❌ Voice error: " + err.error;
    };
}
</script>

</body>
</html>
